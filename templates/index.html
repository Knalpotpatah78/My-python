<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Python CRUD Web App</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      table { border-collapse: collapse; width: 100%; margin-top: 20px; }
      th, td { border: 1px solid #ddd; padding: 8px; }
      th { background: #f4f4f4; }
      input, button { padding: 8px; margin: 4px 0; width: 100%; box-sizing: border-box; }
      .form-group { margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <h1>Python QR Code Generator</h1>
    <p>Masukkan teks atau URL, lalu klik Generate QR Code.</p>

    <div style="margin-top: 24px; padding: 16px; border: 1px solid #ddd; background: #fafafa; max-width: 600px;">
      <div class="form-group">
        <label>Text or URL</label>
        <input id="qrText" type="text" placeholder="Enter text or URL" />
      </div>
      <button onclick="generateQr()">Generate QR Code</button>
      <div id="qrPreview" style="margin-top: 16px;"></div>
    </div>

    <script>
      async function generateQr() {
        const text = document.getElementById('qrText').value;
        const response = await fetch('/api/qrcode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        const result = await response.json();
        if (result.data_uri) {
          document.getElementById('qrPreview').innerHTML = `<img src="${result.data_uri}" alt="QR code" style="max-width: 200px;" />`;
        } else {
          document.getElementById('qrPreview').innerHTML = `<p style="color: red;">${result.error || 'Failed to generate QR code'}</p>`;
        }
      }
    </script>
  </body>
</html>
